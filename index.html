<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Maps App</title>

    <!------------------------------------- Scripts -------------------------------------->

    <!-- Javascript file-->
    <script src="script.js" async></script>

    <!-- Library for confetti effect. Source: https://confetti.js.org/ -->
    <script src="https://cdn.jsdelivr.net/npm/@tsparticles/confetti@3.9.1/tsparticles.confetti.bundle.min.js" async></script>
    
    <!-- Import Google Maps API with marker library -->
    <script
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyCIZFE3R6esx9xqGSg3GuKcNbmoQ65D-Uo&libraries=marker&loading=async&callback=initMap"
        async
        defer>
    </script>

    <!------------------------------------- CSS -------------------------------------->
    <link rel="stylesheet" href="//fonts.googleapis.com/css?family=Source+Sans+Pro:400,400i,700,700i,900,900i" type="text/css" media="all">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <h1>CSUN Map Quiz</h1>

    <div class="quiz-container">
        <div class="quiz">
            <div class="timer-container">
                <p>Timer: </p>
                <p class="timer">00:00:00</p>
            </div>
            <button id="start-button">Start</button>
            <button id="stop-button">Stop</button>
        </div>
        <div id="google-map"></div>
    </div>
</body>
</html>
